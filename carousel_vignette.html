<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Gallery · Yul & Elyza</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory:      #f5f0e8;
    --ivory-dark: #ede5d6;
    --blue:       #4a6580;
    --blue-dark:  #304d65;
    --blue-light: #7a9ab5;
    --blue-pale:  #d6e4ef;
    --blush:      #e8c4b8;
    --text:       #304050;
    --mid:        #6a7f8a;
    --light:      #9aafba;
    --border:     rgba(74,101,128,0.2);
    --section-bg: #eee8da;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--ivory); color: var(--text); font-family: 'Lato', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: center; gap: 2rem; padding: 1rem 2rem;
    background: rgba(245,240,232,0.96); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  nav a { text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--blue); transition: color 0.3s; }
  nav a:hover { color: var(--blue-dark); }

  /* MAIN SECTION */
  #gallery { padding: 4rem 2rem 4rem; min-height: 100vh; background: var(--section-bg); }
  .section-inner { max-width: 780px; margin: 0 auto; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--blue-light); margin-bottom: 0.7rem; }
  .section-title { font-family: 'Great Vibes', cursive; font-size: clamp(2.4rem,5.5vw,3.4rem); color: var(--blue-dark); line-height: 1.1; }
  .thin-rule { display: flex; align-items: center; gap: 0.7rem; margin: 1.2rem 0 2rem; }
  .thin-rule::before, .thin-rule::after { content: ''; flex: 0 0 28px; height: 1px; background: var(--blue-light); }
  .thin-rule-dot { width: 5px; height: 5px; border: 1px solid var(--blue-light); transform: rotate(45deg); }

  /* ── PLACEHOLDER (before 10am) ── */
  #placeholder {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    gap: 1.4rem;
  }
  .placeholder-gem {
    width: 32px; height: 32px;
    border: 1px solid var(--blue-light);
    transform: rotate(45deg);
    opacity: 0.5;
  }
  .placeholder-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--blue-dark);
    line-height: 1.3;
  }
  .placeholder-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--light);
    line-height: 2.2;
  }


  /* ── CAROUSEL ── */
  #carouselWrap { display: none; animation: carouselReveal 1s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes carouselReveal { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* Photo count + live badge row */
  .gallery-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.4rem;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: 'Cinzel', serif; font-size: 0.52rem;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--blue-light);
  }
  .live-dot {
    width: 6px; height: 6px; background: #7aaa8a; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .photo-count {
    font-family: 'Cinzel', serif; font-size: 0.52rem;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--light);
  }

  /* Slide stage */
  .gc-stage {
    position: relative;
    width: 100%;
    background: var(--ivory-dark);
    border: 1px solid var(--border);
    overflow: hidden;
    aspect-ratio: 4/3;
  }
  .gc-slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    transition: opacity 0s;
    pointer-events: none;
  }
  .gc-slide.active {
    opacity: 1;
    transition: opacity 1s ease;
    pointer-events: auto;
  }
  .gc-slide.prev {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .gc-img-wrap {
    flex: 1; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--ivory-dark);
    position: relative;
  }
  .gc-img-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(48, 64, 80, 0.18) 78%,
      rgba(48, 64, 80, 0.38) 100%);
    pointer-events: none;
    z-index: 1;
  }
  .gc-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    transform: scale(1.04);
    opacity: 0;
    transition: transform 1.6s cubic-bezier(0.16,1,0.3,1), opacity 0.9s ease;
  }
  .gc-slide.active .gc-img-wrap img {
    transform: scale(1);
    opacity: 1;
  }

  /* Caption bar */
  .gc-caption {
    background: var(--ivory);
    border-top: 1px solid var(--border);
    padding: 0.9rem 1.4rem;
    min-height: 3.2rem;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
  }
  .gc-slide.active .gc-caption {
    opacity: 1; transform: translateY(0);
  }
  .gc-caption p {
    font-family: 'Lato', sans-serif; font-size: 0.86rem;
    font-weight: 300; color: var(--mid); line-height: 1.8;
    font-style: italic; text-align: center;
  }

  /* Nav arrows */
  .gc-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px;
    background: rgba(245,240,232,0.88);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10;
    transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    opacity: 0.7;
  }
  .gc-nav:hover { background: var(--ivory); border-color: var(--blue-light); opacity: 1; }
  .gc-nav.gc-prev { left: 12px; }
  .gc-nav.gc-next { right: 12px; }
  .gc-nav svg { width: 14px; height: 14px; stroke: var(--blue); stroke-width: 1.5; fill: none; }

  /* Dot pagination */
  .gc-dots {
    display: flex; justify-content: center; align-items: center;
    gap: 0.5rem; margin-top: 1.1rem;
  }
  .gc-dot {
    width: 5px; height: 5px;
    border: 1px solid var(--blue-light);
    transform: rotate(45deg);
    opacity: 0.35; cursor: pointer;
    transition: opacity 0.3s, background 0.3s;
  }
  .gc-dot.active { background: var(--blue-light); opacity: 1; }

  /* Slide counter */
  .gc-counter {
    text-align: center; margin-top: 0.7rem;
    font-family: 'Cinzel', serif; font-size: 0.52rem;
    letter-spacing: 0.22em; color: var(--light);
  }

  /* Empty state */
  #emptyState {
    display: none; text-align: center; padding: 3.5rem 1rem;
  }
  .empty-title { font-family: 'Great Vibes', cursive; font-size: 2rem; color: var(--blue-dark); margin-bottom: 0.5rem; }
  .empty-sub { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--light); }

  /* FOOTER */
  footer { padding: 3rem 2rem; text-align: center; background: var(--blue-dark); }
  .footer-names { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--blue-pale); margin-bottom: 0.5rem; }
  footer p { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.22em; color: var(--blue-pale); opacity: 0.65; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    nav { gap: 1rem; flex-wrap: wrap; padding: 0.8rem 1rem; }
    nav a { font-size: 0.52rem; }
    .gc-nav { width: 30px; height: 30px; }
  }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="upload.html">Upload</a>
  <a href="carousel.html">Gallery</a>
</nav>

<section id="gallery">
  <div class="section-inner">
    <div class="section-label">Wedding Memories</div>
    <h2 class="section-title">Your memories, live</h2>
    <div class="thin-rule"><div class="thin-rule-dot"></div></div>

    <!-- PLACEHOLDER: shown before 10am Aug 8 2026 PHT -->
    <div id="placeholder">
      <div class="placeholder-gem"></div>
      <div class="placeholder-title">Live memories will appear here<br>during the celebration</div>
      <div class="placeholder-sub">The gallery goes live at 10:00 AM · August 8, 2026</div>
    </div>

    <!-- LIVE CAROUSEL: shown from 10am onwards -->
    <div id="carouselWrap">
      <div class="gallery-meta">
        <div class="live-badge"><span class="live-dot"></span> Live gallery</div>
        <div class="photo-count" id="photoCount"></div>
      </div>

      <!-- Empty state -->
      <div id="emptyState">
        <div class="empty-title">Be the first to share a memory</div>
        <div class="empty-sub">Scan the upload QR to add your photos</div>
      </div>

      <!-- Lightweight gallery -->
      <div id="gcWrap" style="display:none;">
        <div class="gc-stage" id="gcStage">
          <!-- slides injected here -->
          <button class="gc-nav gc-prev" id="gcPrev" aria-label="Previous">
            <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
          </button>
          <button class="gc-nav gc-next" id="gcNext" aria-label="Next">
            <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
          </button>
        </div>
        <div class="gc-dots" id="gcDots"></div>
        <div class="gc-counter" id="gcCounter"></div>
      </div>
    </div>

  </div>
</section>

<footer>
  <div class="footer-names">Yul & Elyza</div>
  <p>8.8.26 · Wedding Memories</p>
</footer>

<script>
  // ── Time gate ──────────────────────────────────────────────
  // August 8, 2026, 10:00 AM Philippine Time (UTC+8)
  const UNLOCK_TIME = new Date('2026-08-08T10:00:00+08:00');

  const placeholder   = document.getElementById('placeholder');
  const carouselWrap  = document.getElementById('carouselWrap');

  function isLive() {
    return new Date() >= UNLOCK_TIME;
  }

// ── Swiper instance ────────────────────────────────────────
  let swiperInstance = null;
  let lastPhotoCount = 0;

  function buildSlides(images) {
    const wrapper = document.getElementById('swiperWrapper');
    wrapper.innerHTML = '';
    images.forEach(img => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      slide.innerHTML = `
        <div class="slide-photo-frame">
          <img src="${img.url}" alt="Wedding photo" loading="lazy" />
        </div>
        ${img.message ? `
        <div class="slide-caption">
          <div class="slide-caption-divider"><span class="slide-caption-gem"></span></div>
          <p class="slide-caption-text">${escapeHtml(img.message)}</p>
        </div>` : '<div class="slide-caption"></div>'}
      `;
      wrapper.appendChild(slide);
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderCarousel(images) {
    const swiperEl   = document.getElementById('swiperEl');
    const emptyState = document.getElementById('emptyState');
    const photoCount = document.getElementById('photoCount');

    const n = images.length;
    photoCount.textContent = n > 0 ? `${n} photo${n !== 1 ? 's' : ''} shared` : '';

    if (n === 0) {
      emptyState.style.display = 'block';
      swiperEl.style.display   = 'none';
      if (swiperInstance) { swiperInstance.destroy(true, true); swiperInstance = null; }
      lastPhotoCount = 0;
      return;
    }

    emptyState.style.display = 'none';
    swiperEl.style.display   = 'block';

    if (n !== lastPhotoCount) {
      buildSlides(images);
      if (swiperInstance) { swiperInstance.destroy(true, true); swiperInstance = null; }
      swiperInstance = new Swiper('#swiperEl', {
        loop: n > 1,
        effect: 'fade',
        fadeEffect: { crossFade: true },
        speed: 1200,
        autoplay: n > 1 ? { delay: 6000, disableOnInteraction: false } : false,
        pagination: { el: '.swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
        keyboard: { enabled: true },
        on: {
          slideChangeTransitionStart() {
            const active = this.slides[this.activeIndex];
            if (!active) return;
            const img = active.querySelector('img');
            const cap = active.querySelector('.slide-caption-text');
            if (img) {
              img.style.transition = 'none';
              img.style.transform = 'scale(1.06)';
              img.style.opacity = '0';
              requestAnimationFrame(() => {
                img.style.transition = 'transform 1.4s ease, opacity 0.8s ease';
                img.style.transform = 'scale(1)';
                img.style.opacity = '1';
              });
            }
            if (cap) {
              cap.style.transition = 'none';
              cap.style.opacity = '0';
              cap.style.transform = 'translateY(12px)';
              requestAnimationFrame(() => {
                cap.style.transition = 'opacity 0.9s ease 0.5s, transform 0.9s ease 0.5s';
                cap.style.opacity = '1';
                cap.style.transform = 'translateY(0)';
              });
            }
          },
          afterInit() {
            const active = this.slides[this.activeIndex];
            if (!active) return;
            const img = active.querySelector('img');
            const cap = active.querySelector('.slide-caption-text');
            if (img) {
              img.style.transition = 'transform 1.4s ease, opacity 0.8s ease';
              img.style.transform = 'scale(1.06)';
              img.style.opacity = '0';
              requestAnimationFrame(() => {
                img.style.transform = 'scale(1)';
                img.style.opacity = '1';
              });
            }
            if (cap) {
              cap.style.opacity = '0';
              cap.style.transform = 'translateY(12px)';
              cap.style.transition = 'opacity 0.9s ease 0.8s, transform 0.9s ease 0.8s';
              requestAnimationFrame(() => {
                cap.style.opacity = '1';
                cap.style.transform = 'translateY(0)';
              });
            }
          }
        }
      });
      lastPhotoCount = n;
    }
  }

  // Cloudinary config
  const CLOUD_NAME = 'dlizcifl7';
  const FOLDER     = 'Wedding2026';
  // Cloudinary search API — fetches all images in the folder, newest first
  const SEARCH_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/resources/search`;

  // ── Fetch images from Cloudinary ──────────────────────────
  async function fetchImages() {
    try {
      const res = await fetch(
        `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`,
        { cache: 'no-store' }
      );
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      // Map resources to { url, message }
      const images = (data.resources || []).map(r => ({
        url: `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${r.public_id}`,
        message: r.context?.custom?.caption || ''
      }));
      renderCarousel(images);
    } catch (err) {
      console.warn('Gallery fetch failed, retrying…', err);
    }
  }

  // ── Activate live mode ─────────────────────────────────────
  function activateLive() {
    placeholder.style.display  = 'none';
    carouselWrap.style.display = 'block';
    fetchImages();
    // Poll every 30 seconds for new uploads
    setInterval(fetchImages, 30000);
  }

  // ── Init ───────────────────────────────────────────────────
  // TESTING MODE: time gate bypassed — always show carousel
  // TODO: restore the if/else block before the wedding day
  activateLive();

  /* RESTORE BEFORE WEDDING DAY:
  if (isLive()) {
    activateLive();
  } else {
    placeholder.style.display = 'flex';
    setInterval(() => { if (isLive()) activateLive(); }, 60000);
  }
  */
</script>

</body>
</html>
