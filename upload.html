<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Wedding Photos</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory:      #f5f0e8;
    --ivory-dark: #ede5d6;
    --blue:       #4a6580;
    --blue-dark:  #304d65;
    --blue-light: #7a9ab5;
    --blue-pale:  #d6e4ef;
    --sage:       #8aaa8a;
    --blush:      #e8c4b8;
    --text:       #304050;
    --mid:        #6a7f8a;
    --light:      #9aafba;
    --border:     rgba(74,101,128,0.2);
    --section-bg: #eee8da;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--ivory); color: var(--text); font-family: 'Lato', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: center; gap: 2rem; padding: 1rem 2rem;
    background: rgba(245,240,232,0.96); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  nav a { text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--blue); transition: color 0.3s; }
  nav a:hover { color: var(--blue-dark); }

  /* HERO */
  #hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 5rem 2rem 3rem;
    position: relative; overflow: hidden; background: var(--ivory);
  }
  .floral-corner { position: absolute; width: 230px; height: 230px; pointer-events: none; }
  .floral-corner.tl { top: 55px; left: -10px; }
  .floral-corner.tr { top: 55px; right: -10px; transform: scaleX(-1); }
  .floral-corner.bl { bottom: -10px; left: -10px; transform: scaleY(-1); }
  .floral-corner.br { bottom: -10px; right: -10px; transform: scale(-1,-1); }

  .monogram { font-family: 'Cinzel', serif; font-size: clamp(1.6rem,4vw,2.4rem); color: var(--blue-dark); letter-spacing: 0.1em; margin-bottom: 1.2rem; opacity: 0; animation: fadeUp 1s 0.2s forwards; }
  .hero-date-big { font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,3rem); font-weight: 500; color: var(--blue-dark); letter-spacing: 0.2em; margin-bottom: 0.6rem; opacity: 0; animation: fadeUp 1s 0.35s forwards; }
  .save-label { font-family: 'Cinzel', serif; font-size: clamp(0.65rem,1.5vw,0.82rem); letter-spacing: 0.35em; text-transform: uppercase; color: var(--blue); margin-bottom: 1.4rem; opacity: 0; animation: fadeUp 1s 0.5s forwards; }
  h1 { font-family: 'Great Vibes', cursive; font-size: clamp(4.5rem,15vw,9.5rem); line-height: 1.0; color: var(--blue-dark); opacity: 0; animation: fadeUp 1.2s 0.65s forwards; margin-bottom: 0.5rem; }
  .hero-divider { display: flex; align-items: center; gap: 0.8rem; margin: 1.5rem auto; width: min(260px,70vw); opacity: 0; animation: fadeUp 1s 0.9s forwards; }
  .hero-divider::before, .hero-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--blue-light)); }
  .hero-divider::after { background: linear-gradient(to left, transparent, var(--blue-light)); }
  .hero-divider-gem { width: 7px; height: 7px; background: var(--blue-light); transform: rotate(45deg); }
  .hero-location { font-family: 'Cinzel', serif; font-size: clamp(0.6rem,1.4vw,0.74rem); letter-spacing: 0.22em; text-transform: uppercase; color: var(--mid); line-height: 2.2; opacity: 0; animation: fadeUp 1s 1.1s forwards; }

  /* FLORAL BAND */
  .floral-band { height: 70px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .floral-band-reg { background: linear-gradient(to bottom, var(--ivory), var(--section-bg)); }
  .floral-band-alt { background: linear-gradient(to bottom, var(--section-bg), var(--ivory)); }
  .floral-band::before { content: '✿  ✦  ✿  ✦  ✿  ✦  ✿'; font-size: 0.85rem; letter-spacing: 1.2rem; color: rgba(74,101,128,0.22); }

  /* PHOTO GALLERY */
  #photo { padding: 4rem 2rem; background: var(--section-bg); }
  .photo-gallery { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
  .photo-main { width: 100%; }
  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .photo-slot { position: relative; border: 1px solid var(--border); overflow: hidden; }
  .photo-main .photo-slot { aspect-ratio: 3/2; }
  .photo-row .photo-slot { aspect-ratio: 3/4; }
  .photo-placeholder { width: 100%; height: 100%; min-height: 140px; background: linear-gradient(145deg, var(--blue-pale), #bdd4e4); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.6rem; color: var(--blue); font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; }
  .photo-placeholder:hover { background: linear-gradient(145deg, #bdd4e4, #aac8d8); }
  .photo-placeholder svg { opacity: 0.6; }
  .photo-actual { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-slot input[type="file"] { display: none; }

  /* SECTIONS */
  section { padding: 5rem 2rem; }
  .section-inner { max-width: 700px; margin: 0 auto; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--blue-light); margin-bottom: 0.7rem; }
  .section-title { font-family: 'Great Vibes', cursive; font-size: clamp(2.4rem,5.5vw,3.4rem); color: var(--blue-dark); line-height: 1.1; }
  .thin-rule { display: flex; align-items: center; gap: 0.7rem; margin: 1.2rem 0 1.8rem; }
  .thin-rule::before, .thin-rule::after { content: ''; flex: 0 0 28px; height: 1px; background: var(--blue-light); }
  .thin-rule-dot { width: 5px; height: 5px; border: 1px solid var(--blue-light); transform: rotate(45deg); }
  .section-body { font-size: 0.9rem; line-height: 2; color: var(--mid); }

  /* DETAILS */
  #details { background: var(--ivory); }
  .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 1.8rem; margin-top: 2.5rem; }
  .detail-item { text-align: center; padding: 1.8rem 1rem; border: 1px solid var(--border); background: rgba(214,228,239,0.13); }
  .detail-icon { width: 30px; height: 30px; margin: 0 auto 0.8rem; opacity: 0.5; }
  .detail-label { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.5rem; }
  .detail-value { font-family: 'Great Vibes', cursive; font-size: 1.65rem; line-height: 1.3; color: var(--blue-dark); }
  .detail-sub { font-size: 0.7rem; color: var(--light); margin-top: 0.3rem; font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

  /* SCHEDULE */
  #schedule { background: var(--section-bg); }
  .timeline { margin-top: 2.5rem; }
  .timeline-item { display: flex; gap: 1.5rem; padding: 1.3rem 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-time { font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--blue); min-width: 68px; padding-top: 0.15rem; }
  .tl-dot { width: 7px; height: 7px; flex-shrink: 0; border: 1px solid var(--blue-light); transform: rotate(45deg); margin-top: 0.25rem; }
  .event-name { font-family: 'Cinzel', serif; font-size: 0.74rem; font-weight: 500; color: var(--blue-dark); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
  .event-desc { font-size: 0.8rem; color: var(--mid); line-height: 1.7; }

  /* DRESS CODE */
  #dresscode { background: var(--ivory); }
  .dresscode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.5rem; margin-top: 2.5rem; }
  .dresscode-card { border: 1px solid var(--border); padding: 2rem 1.5rem; text-align: center; background: rgba(214,228,239,0.12); transition: border-color 0.3s, transform 0.3s; }
  .dresscode-card:hover { border-color: var(--blue-light); transform: translateY(-3px); }
  .dresscode-card-icon { font-size: 2rem; margin-bottom: 0.8rem; }
  .dresscode-card-title { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.6rem; }
  .dresscode-card-detail { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: var(--blue-dark); line-height: 1.2; margin-bottom: 0.4rem; }
  .dresscode-card-sub { font-size: 0.78rem; color: var(--mid); line-height: 1.7; }
  .dresscode-note { margin-top: 2rem; padding: 1.2rem 1.5rem; border-left: 2px solid var(--blue-light); background: rgba(214,228,239,0.18); font-size: 0.82rem; color: var(--mid); line-height: 1.9; }
  .dresscode-note strong { color: var(--blue); font-weight: 400; }

  /* GIFTS */
  #gifts { background: var(--section-bg); }
  .gift-note { font-family: 'Great Vibes', cursive; font-size: 1.6rem; color: var(--blue); line-height: 1.7; margin: 1.5rem 0; }
  .gift-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 1.5rem; margin-top: 2rem; }
  .gift-card { border: 1px solid var(--border); padding: 1.8rem 1.2rem; text-align: center; background: var(--ivory); transition: border-color 0.3s, transform 0.3s; }
  .gift-card:hover { border-color: var(--blue-light); transform: translateY(-2px); }
  .gift-card-title { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.8rem; }
  .gift-card-detail { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--blue-dark); line-height: 1.9; }
  .gift-card-sub { font-size: 0.7rem; color: var(--light); margin-top: 0.4rem; }

  /* RSVP */
  #rsvp { background: var(--ivory); }
  .rsvp-google-btn {
    display: inline-block;
    padding: 1.1rem 2.5rem;
    background: var(--blue-dark);
    color: var(--ivory);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    transition: background 0.3s, transform 0.2s;
    border: 1px solid transparent;
  }
  .rsvp-google-btn:hover { background: var(--blue); transform: translateY(-2px); }

  /* FOOTER */
  footer { padding: 3rem 2rem; text-align: center; background: var(--blue-dark); }
  .footer-names { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--blue-pale); margin-bottom: 0.5rem; }
  footer p { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.22em; color: var(--blue-pale); opacity: 0.65; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  @media (max-width: 600px) { nav { gap: 1rem; flex-wrap: wrap; padding: 0.8rem 1rem; } nav a { font-size: 0.52rem; } }
</style>
</head>
<body>

<nav>
  <a href="#">Home</a>
  <a href="#">Upload</a>
  <a href="#">Gallery</a>
</nav>

<section id="photo">
  <div class="section-inner">
    <div class="section-label">Share Your Memories</div>
    <h2 class="section-title">Upload Photos</h2>
    <div class="thin-rule"><div class="thin-rule-dot"></div></div>
    <p class="section-body">You can upload up to <strong>5 images</strong> at a time.</p>

    <form id="uploadForm" enctype="multipart/form-data" class="photo-gallery">
      <div class="photo-main">
        <label class="photo-slot">
          <input type="file" name="images" accept="image/*" multiple required />
          <div class="photo-placeholder">Click to Upload</div>
        </label>
      </div>
      <button type="submit" class="rsvp-google-btn">Upload</button>
    </form>
  </div>
</section>

<script>
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const files = e.target.images.files;
  if (files.length > 5) {
    alert("You can only upload up to 5 images at a time!");
    return;
  }
  const formData = new FormData();
  for (let file of files) formData.append("images", file);
  await fetch("/upload", { method: "POST", body: formData });
  alert("Upload successful!");
});
</script>

<footer>
  <div class="footer-names">Yul & Elyza</div>
  <p>8.8.26 · Wedding Memories</p>
</footer>

</body>
</html>
