<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Gallery · Yul & Elyza</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory:       #f5f0e8;
    --ivory-dark:  #ede5d6;
    --blue:        #4a6580;
    --blue-dark:   #304d65;
    --blue-light:  #7a9ab5;
    --blue-pale:   #d6e4ef;
    --blush:       #e8c4b8;
    --text:        #304050;
    --mid:         #6a7f8a;
    --light:       #9aafba;
    --border:      rgba(74,101,128,0.2);
    --section-bg:  #eee8da;
    --shadow-soft: rgba(48,64,80,0.10);
    --shadow-med:  rgba(48,64,80,0.16);
  }

  html { scroll-behavior: smooth; }

  /* ── PREVENT IMAGE SAVING ── */
  img { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; pointer-events: none; }
  .carousel-track { pointer-events: all; }
  .lightbox-img   { pointer-events: none; }
  body { background: var(--ivory); color: var(--text); font-family: 'Lato', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: center; gap: 2.5rem; padding: 1.1rem 2rem;
    background: rgba(245,240,232,0.97); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  nav a {
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--blue);
    transition: color 0.3s, letter-spacing 0.3s;
  }
  nav a:hover { color: var(--blue-dark); letter-spacing: 0.32em; }

  /* ── GALLERY SECTION ── */
  #gallery {
    padding: 5rem 2rem 4rem;
    background: var(--section-bg);
    min-height: 100vh;
  }
  .section-inner { max-width: 820px; margin: 0 auto; }
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.56rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--blue-light);
    margin-bottom: 0.4rem;
  }
  .section-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.5rem, 5.5vw, 3.6rem);
    color: var(--blue-dark);
    line-height: 1.1;
  }
  .thin-rule {
    display: flex; align-items: center; gap: 0.8rem;
    margin: 1rem 0 1.4rem;
  }
  .thin-rule::before, .thin-rule::after {
    content: ''; flex: 0 0 32px; height: 1px; background: var(--blue-light); opacity: 0.7;
  }
  .thin-rule-dot {
    width: 5px; height: 5px;
    border: 1px solid var(--blue-light);
    transform: rotate(45deg);
    background: var(--blue-pale);
    opacity: 0.8;
  }

  /* ── PLACEHOLDER ── */
  #placeholder {
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 5rem 2rem; gap: 1.5rem;
  }
  .placeholder-gem {
    width: 28px; height: 28px;
    border: 1px solid var(--blue-light);
    transform: rotate(45deg); opacity: 0.45;
  }
  .placeholder-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.9rem, 4vw, 2.7rem);
    color: var(--blue-dark); line-height: 1.35;
  }
  .placeholder-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--light); line-height: 2.3;
  }

  /* ── LIVE BADGE ── */
  .live-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: 'Cinzel', serif; font-size: 0.5rem;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--blue-light);
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(245,240,232,0.7);
    backdrop-filter: blur(8px);
    margin-bottom: 0.6rem;
  }
  .live-dot {
    width: 5px; height: 5px;
    background: #7aaa8a; border-radius: 50%;
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  .photo-count {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--light);
    margin-bottom: 1rem;
  }

  /* ── CAROUSEL WRAPPER ── */
  #carouselWrap {
    display: none;
    animation: carouselReveal 1.2s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes carouselReveal {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── EMPTY STATE ── */
  #emptyState { display: none; text-align: center; padding: 4rem 1rem; }
  .empty-title { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--blue-dark); margin-bottom: 0.6rem; }
  .empty-sub   { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--light); }

  /* ── CAROUSEL (index.html style) ── */
  .carousel-wrap {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
  }
  .carousel-track {
    position: relative;
    width: 100%;
    aspect-ratio: 3/2;
    overflow: hidden;
    background: var(--ivory-dark);
    cursor: zoom-in;
    border: 1px solid rgba(74,101,128,0.18);
    border-radius: 6px;
    box-shadow:
      0 2px 6px var(--shadow-soft),
      0 12px 32px var(--shadow-med),
      inset 0 1px 0 rgba(255,255,255,0.55);
  }
  .carousel-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .carousel-slide.active { opacity: 1; }

  /* Blurred background layer */
  .carousel-slide-bg {
    position: absolute;
    inset: -10%;
    background-size: cover;
    background-position: center;
    filter: blur(18px) brightness(0.75) saturate(1.1);
    transform: scale(1.1);
    transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .carousel-track:hover .carousel-slide.active .carousel-slide-bg {
    transform: scale(1.15);
  }

  /* Foreground image — full, uncropped */
  .carousel-slide img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    z-index: 1;
    transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .carousel-track:hover .carousel-slide.active img {
    transform: scale(1.02);
  }

  /* Caption overlay */
  .carousel-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 1.4rem 1.4rem 1rem;
    background: linear-gradient(to top, rgba(30,40,50,0.72) 0%, rgba(30,40,50,0.3) 55%, transparent 100%);
    border-radius: 0 0 6px 6px;
    pointer-events: none;
  }
  .carousel-caption-rule {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem;
  }
  .carousel-caption-rule::before {
    content: ''; display: block; width: 18px; height: 1px; background: rgba(214,228,239,0.55);
  }
  .carousel-caption-rule-gem {
    width: 4px; height: 4px;
    border: 1px solid rgba(214,228,239,0.6);
    transform: rotate(45deg);
  }
  .carousel-caption-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.1rem, 2.6vw, 1.45rem);
    color: rgba(255,255,255,0.93);
    line-height: 1.45;
    text-shadow: 0 1px 8px rgba(0,0,0,0.45);
  }

  /* Dot indicators */
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 0.55rem;
    margin-top: 1.2rem;
  }
  .carousel-dot {
    width: 6px; height: 6px;
    border: 1px solid var(--blue-light);
    transform: rotate(45deg);
    background: transparent;
    transition: background 0.4s, border-color 0.4s;
    cursor: pointer;
  }
  .carousel-dot.active { background: var(--blue-light); }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,16,12,0.92);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    cursor: zoom-out;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox-img {
    max-width: 90vw; max-height: 90vh;
    object-fit: contain; display: block;
    border-radius: 3px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    cursor: default;
  }
  .lightbox-close {
    position: absolute; top: 1.4rem; right: 1.6rem;
    font-family: 'Cinzel', serif; font-size: 0.55rem;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(214,228,239,0.7);
    background: none; border: none; cursor: pointer;
    transition: color 0.2s;
  }
  .lightbox-close:hover { color: #fff; }

  @media (max-width: 600px) {
    .carousel-track { aspect-ratio: 4/3; }
  }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="rsvp.html">RSVP</a>
</nav>

<section id="gallery">
  <div class="section-inner">
    <p class="section-label">Live Gallery</p>
    <h2 class="section-title">Our Memories</h2>
    <div class="thin-rule"><div class="thin-rule-dot"></div></div>

    <!-- Placeholder: shown before unlock time -->
    <div id="placeholder">
      <div class="placeholder-gem"></div>
      <p class="placeholder-title">Photos coming soon</p>
      <p class="placeholder-sub">The gallery will go live<br>on the wedding day · August 8, 2026</p>
    </div>

    <!-- Live gallery -->
    <div id="carouselWrap">
      <div class="live-badge"><span class="live-dot"></span> Live gallery</div>
      <div class="photo-count" id="photoCount"></div>

      <!-- Empty state -->
      <div id="emptyState">
        <p class="empty-title">Be the first to share a memory</p>
        <p class="empty-sub">Scan the upload QR to add your photos</p>
      </div>

      <!-- Carousel -->
      <div class="carousel-wrap" id="carouselWrapInner" style="display:none;">
        <div class="carousel-track" id="carouselTrack"></div>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ &nbsp; Close</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" />
</div>

<script>
  // ── Lightbox ──────────────────────────────────────────────
  const lightbox      = document.getElementById('lightbox');
  const lightboxImg   = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    clearInterval(timer);
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { lightboxImg.src = ''; }, 300);
    startTimer();
  }
  lightboxClose.addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
  lightbox.addEventListener('click', closeLightbox);
  lightboxImg.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Carousel state ────────────────────────────────────────
  let slides   = [];
  let dots     = [];
  let current  = 0;
  let timer;

  function goToSlide(n) {
    if (!slides.length) return;
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function next() { goToSlide(current + 1); }
  function startTimer() { if (slides.length > 1) timer = setInterval(next, 3000); }
  function resetTimer()  { clearInterval(timer); startTimer(); }

  // ── Build carousel from images array ─────────────────────
  function buildCarousel(images) {
    const track   = document.getElementById('carouselTrack');
    const dotsEl  = document.getElementById('carouselDots');
    const wrapper = document.getElementById('carouselWrapInner');

    clearInterval(timer);
    track.innerHTML  = '';
    dotsEl.innerHTML = '';
    slides  = [];
    dots    = [];
    current = 0;

    images.forEach((img, i) => {
      // Slide
      const slide = document.createElement('div');
      slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
      slide.innerHTML = `
        <div class="carousel-slide-bg" style="background-image:url('${img.url}')"></div>
        <img src="${img.url}" alt="Wedding photo" loading="${i === 0 ? 'eager' : 'lazy'}" />
        ${img.message ? `
        <div class="carousel-caption">
          <div class="carousel-caption-rule"><span class="carousel-caption-rule-gem"></span></div>
          <p class="carousel-caption-text">${escapeHtml(img.message)}</p>
        </div>` : ''}
      `;
      track.appendChild(slide);
      slides.push(slide);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => { goToSlide(i); resetTimer(); });
      dotsEl.appendChild(dot);
      dots.push(dot);
    });

    // ── Click vs drag detection ───────────────────────────────
    let dragStartX = null;
    let dragStartY = null;
    let isDragging = false;

    track.addEventListener('mousedown',  e => { dragStartX = e.clientX; dragStartY = e.clientY; isDragging = false; });
    track.addEventListener('mousemove',  e => { if (dragStartX !== null && Math.abs(e.clientX - dragStartX) > 6) isDragging = true; });
    track.addEventListener('mouseup',    e => {
      if (dragStartX === null) return;
      const dx = dragStartX - e.clientX;
      if (Math.abs(dx) > 40) { dx > 0 ? goToSlide(current + 1) : goToSlide(current - 1); resetTimer(); }
      dragStartX = null; dragStartY = null;
    });
    track.addEventListener('mouseleave', () => { dragStartX = null; isDragging = false; });
    track.addEventListener('click',      e => { if (isDragging) { isDragging = false; return; } openLightbox(slides[current].querySelector('img').src); });

    // Pause on hover
    track.addEventListener('mouseenter', () => clearInterval(timer));
    track.addEventListener('mouseleave', () => { if (!lightbox.classList.contains('open')) startTimer(); });

    // Touch swipe
    let touchStartX = null, touchStartY = null;
    track.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    track.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = touchStartX - e.changedTouches[0].clientX;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        dx > 0 ? goToSlide(current + 1) : goToSlide(current - 1);
        resetTimer();
      }
      touchStartX = null; touchStartY = null;
    }, { passive: true });

    wrapper.style.display = 'block';
    startTimer();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Render / update carousel ──────────────────────────────
  let lastPhotoCount = 0;

  function renderCarousel(images) {
    const emptyState = document.getElementById('emptyState');
    const wrapper    = document.getElementById('carouselWrapInner');
    const photoCount = document.getElementById('photoCount');
    const n = images.length;

    photoCount.textContent = n > 0 ? `${n} photo${n !== 1 ? 's' : ''} shared` : '';

    if (n === 0) {
      emptyState.style.display = 'block';
      wrapper.style.display    = 'none';
      lastPhotoCount = 0;
      return;
    }

    emptyState.style.display = 'none';
    if (n !== lastPhotoCount) {
      buildCarousel(images);
      lastPhotoCount = n;
    }
  }

  // ── Cloudinary fetch ──────────────────────────────────────
  const CLOUD_NAME = 'dlizcifl7';
  const FOLDER     = 'Wedding2026';

  async function fetchImages() {
    try {
      const res = await fetch(
        `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`,
        { cache: 'no-store' }
      );
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      const images = (data.resources || []).map(r => ({
        url:     `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${r.public_id}`,
        message: r.context?.custom?.caption || ''
      }));
      renderCarousel(images);
    } catch (err) {
      console.warn('Gallery fetch failed, retrying…', err);
    }
  }

  // ── Activate live mode ────────────────────────────────────
  const UNLOCK_TIME  = new Date('2026-08-08T10:00:00+08:00');
  const placeholder  = document.getElementById('placeholder');
  const carouselWrap = document.getElementById('carouselWrap');

  function activateLive() {
    placeholder.style.display  = 'none';
    carouselWrap.style.display = 'block';
    fetchImages();
    setInterval(fetchImages, 30000);
  }

  // TESTING MODE — always show carousel
  // TODO: restore the if/else block before the wedding day
  activateLive();

  /* RESTORE BEFORE WEDDING DAY:
  if (new Date() >= UNLOCK_TIME) {
    activateLive();
  } else {
    placeholder.style.display = 'flex';
    setInterval(() => { if (new Date() >= UNLOCK_TIME) activateLive(); }, 60000);
  }
  */

  // Prevent image saving
  document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
</script>
</body>
</html>
